[platformio]
default_envs = esp32_bridge_ota

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
lib_deps =
  madhephaestus/ESP32Servo @ ^3.0.8

[env:esp32_bridge_usb]
upload_speed = 921600

[env:esp32_bridge_ota]
upload_protocol = espota
upload_port = esp32-grbl-bridge.local

[env:esp32_bridge_ota_ip]
upload_protocol = espota
upload_port = 10.0.0.89

[env:esp32_bridge_ota_ip_90]
upload_protocol = espota
upload_port = 10.0.0.90
